name: Refresh Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  refresh-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard data
        run: python scripts/export_dashboard_data.py

      - name: Commit refreshed dashboard data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh dashboard data"
          file_pattern: data/dashboard-data.json
